name: CI

on:
  push:
  pull_request:

jobs:
  build-and-smoke:
    name: Build and smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check generated tool docs
        run: npm run check:docs

      - name: Check workflow docs examples
        run: npm run check:workflows

      - name: Check package contents
        run: npm run check:package

      # Full Godot integration smoke tests run locally when Godot is available.
      # CI intentionally covers build plus the no-Godot MCP smoke checks.
      - name: Smoke tests
        env:
          SMOKE_GODOT_MODE: none
        run: npm run smoke
